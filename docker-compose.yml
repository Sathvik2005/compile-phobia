version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compile-phobia-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_API=https://api.github.com
    restart: unless-stopped
    networks:
      - compile-phobia-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/rate-limit"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./devsync-frontend
      dockerfile: Dockerfile
    container_name: compile-phobia-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://backend:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - compile-phobia-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  compile-phobia-net:
    driver: bridge

volumes:
  backend-cache:
  frontend-dist:
